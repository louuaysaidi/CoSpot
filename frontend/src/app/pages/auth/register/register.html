<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">Co<em>Spot</em></div>
    <h2 class="auth-title">Creer un compte</h2>
    <p class="auth-sub">Rejoignez CoSpot et reservez votre espace.</p>

    <div class="alert alert-error"   *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="alert alert-success" *ngIf="successMsg">{{ successMsg }}</div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" class="form-control" placeholder="Benali"
                 [(ngModel)]="nom" name="nom" required/>
        </div>
        <div class="form-group">
          <label>Prenom</label>
          <input type="text" class="form-control" placeholder="Karim"
                 [(ngModel)]="prenom" name="prenom" required/>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="votre@email.com"
               [(ngModel)]="email" name="email" required/>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" class="form-control" placeholder="••••••••"
               [(ngModel)]="mot_de_passe" name="mot_de_passe" required/>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" class="form-control" placeholder="••••••••"
               [(ngModel)]="confirmer" name="confirmer" required/>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Creation...' : 'Creer mon compte' }}
      </button>

    </form>

    <p class="auth-footer">
      Deja un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>

  </div>
</div>

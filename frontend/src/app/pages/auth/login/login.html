<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">Co<em>Spot</em></div>
    <h2 class="auth-title">Se connecter</h2>
    <p class="auth-sub">Bienvenue ! Entrez vos identifiants.</p>

    <!-- Error -->
    <div class="alert alert-error" *ngIf="errorMsg">{{ errorMsg }}</div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          placeholder="votre@email.com"
          [(ngModel)]="email"
          name="email"
          required/>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          type="password"
          class="form-control"
          placeholder="••••••••"
          [(ngModel)]="mot_de_passe"
          name="mot_de_passe"
          required/>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>

    </form>

    <p class="auth-footer">
      Pas encore de compte ?
      <a routerLink="/register">Creer un compte</a>
    </p>

  </div>
</div>
